
<!DOCTYPE html>
<html>
<body>
<h1>💰 REAL MODE DASHBOARD</h1>

<button onclick="fetch('/start')">Start</button>
<button onclick="fetch('/kill')">Stop</button>
<button onclick="fetch('/login')">Login</button>

<pre id="data"></pre>

<script>
async function load(){
  try{
    const res = await fetch('/dashboard');
    const data = await res.json();
    document.getElementById('data').innerText = JSON.stringify(data,null,2);
  }catch(e){}
}
setInterval(load,3000);
load();
</script>
</body>
</html>
