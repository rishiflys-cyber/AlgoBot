
<!DOCTYPE html>
<html>
<head>
<title>AlgoBot Terminal</title>
<style>
body{background:#0d1117;color:#fff;font-family:Arial}
.box{background:#161b22;padding:15px;margin:10px;border-radius:8px}
</style>
</head>
<body>

<h2>🚀 AlgoBot Live Terminal</h2>

<div class="box" id="capital"></div>
<div class="box" id="live"></div>
<div class="box" id="history"></div>

<script>
async function load(){

  let perf = await fetch('/performance').then(r=>r.json());
  document.getElementById('capital').innerHTML = 
    "Capital: " + perf.capital;

  let live = await fetch('/api/live').then(r=>r.json());
  document.getElementById('live').innerHTML = 
    "<b>Live Trades:</b><br>" + JSON.stringify(live.trades,null,2);

  let hist = await fetch('/api/history').then(r=>r.json());
  document.getElementById('history').innerHTML = 
    "<b>Trade History:</b><br>" + JSON.stringify(hist.closedTrades,null,2);
}

setInterval(load,3000);
load();
</script>

</body>
</html>
