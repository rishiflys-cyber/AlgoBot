
<!DOCTYPE html>
<html>
<head>
<title>AlgoBot Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; background:#111; color:#fff; }
.card { background:#222; padding:20px; margin:10px; border-radius:10px; }
</style>
</head>
<body>

<h2>🚀 AlgoBot Dashboard</h2>

<div class="card" id="stats"></div>

<canvas id="chart" height="100"></canvas>

<script>
async function loadData(){
  const res = await fetch('/api/data');
  const data = await res.json();

  document.getElementById('stats').innerHTML = `
    Capital: ${data.capital.toFixed(2)}<br>
    Trades: ${data.stats.total}<br>
    Win Rate: ${data.stats.winRate.toFixed(2)}%<br>
    PnL: ${data.stats.totalPnL}
  `;

  const pnlData = data.trades.map(t=>t.pnl);
  const labels = data.trades.map((_,i)=>i+1);

  new Chart(document.getElementById('chart'),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{label:'PnL',data:pnlData}]
    }
  });
}

loadData();
setInterval(loadData,5000);
</script>

</body>
</html>
